name: CI

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  validate:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run critical Playwright flows
        env:
          CI: true
          UPSTASH_REDIS_REST_URL: ""
        run: npx playwright test tests/flows/auth-flow.spec.ts tests/flows/blog-routes.spec.ts tests/flows/audit-to-cta.spec.ts tests/flows/audit-quota.spec.ts tests/compliance-matrix-xlsx-export.spec.ts --reporter=list