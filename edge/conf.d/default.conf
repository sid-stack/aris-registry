server {
    listen 80;
    server_name _;

    # Force HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    # ─────────────────────────────────────────────────────────
    # STRICT TLS TERMINATION (Drop certs into /edge/certs/ )
    # ─────────────────────────────────────────────────────────
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ─────────────────────────────────────────────────────────
    # STATIC UI DEPLOYMENT (Vite built to /usr/share/nginx/html)
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────
    # API REVERSE PROXY & RATE LIMITING
    # ─────────────────────────────────────────────────────────
    location /api/ {
        # Anthropic Compute Protection (5 req/sec + burst of 10)
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # Protect against long-context OOM timeouts (3 mins)
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;

        # Internal Routing (Bridge Network only)
        proxy_pass http://api:8000/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
