name: Quality Gate

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  quality-check:
    name: Quality Gate Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enforce MVP scope gate
        run: npm run mvp:gate

      - name: Check for console statements
        run: |
          echo "🔍 Checking for console statements in production code..."
          CONSOLES=$(grep -r "console\." src/ --include="*.js" --include="*.jsx" | wc -l || true)
          if [ "$CONSOLES" -gt 0 ]; then
            echo "❌ Found $CONSOLES console statements that need to be removed:"
            grep -r "console\." src/ --include="*.js" --include="*.jsx"
            exit 1
          else
            echo "✅ No console statements found"
          fi

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for hardcoded secrets..."
          if grep -r -E "(sk_|pk_|sk_test_|pk_test_|API_KEY|SECRET|PASSWORD|TOKEN)" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx"; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

      - name: Check bundle size
        run: |
          echo "📦 Checking bundle size..."
          npm run build
          BUNDLE_SIZE=$(du -k dist/ | cut -f1)
          echo "Current bundle size: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt 5000 ]; then
            echo "⚠️ Bundle size is large (${BUNDLE_SIZE}KB). Consider optimization."
          else
            echo "✅ Bundle size is acceptable"
          fi

      - name: Run accessibility audit
        run: |
          echo "♿ Running accessibility audit..."
          npx pa11y-ci --sitemap http://localhost:4173/sitemap.xml || echo "⚠️ Accessibility issues found"

      - name: Check environment variables
        run: |
          echo "🔧 Checking environment configuration..."
          if [ ! -f ".env.example" ]; then
            echo "❌ .env.example file missing"
            exit 1
          fi
          echo "✅ Environment configuration exists"

      - name: Validate package.json scripts
        run: |
          echo "📜 Validating package.json scripts..."
          if ! npm run test:ci --dry-run; then
            echo "❌ Test script not properly configured"
            exit 1
          fi
          echo "✅ Package.json scripts are valid"

      - name: Check for missing error boundaries
        run: |
          echo "🛡️ Checking for error boundaries..."
          if ! grep -r "ErrorBoundary\|componentDidCatch" src/ --include="*.js" --include="*.jsx"; then
            echo "⚠️ No error boundaries found. Consider adding for better error handling."
          else
            echo "✅ Error boundaries found"
          fi

      - name: Quality gate summary
        run: |
          echo "📊 Quality Gate Summary:"
          echo "✅ All quality checks passed"
          echo "🚀 Ready for merge"
