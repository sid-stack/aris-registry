# Optional Python SDK / registry — runs only when Python paths change.
name: Aris Python SDK

on:
  push:
    branches: [main, master, develop]
    paths:
      - "aris/**"
      - "agent_node/**"
      - "registry/**"
      - "requirements*.txt"
      - "setup.py"
      - "pyproject.toml"
      - ".github/workflows/aris-python-ci.yml"
  pull_request:
    paths:
      - "aris/**"
      - "agent_node/**"
      - "registry/**"
      - "requirements*.txt"
      - "setup.py"
      - "pyproject.toml"
      - ".github/workflows/aris-python-ci.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (aris SDK / registry)
        run: python -m pytest aris/tests/
