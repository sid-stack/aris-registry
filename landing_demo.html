<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BidSmith – AI SaaS Platform</title>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind (browser build) -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .animate-float { animation: float 6s ease-in-out infinite; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Hooks ---
    const useDarkMode = () => {
      const [isDark, setIsDark] = useState(() => {
        const stored = localStorage.getItem('bidsmith-dark');
        if (stored !== null) return stored === 'true';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });

      useEffect(() => {
        const html = document.documentElement;
        if (isDark) html.classList.add('dark');
        else html.classList.remove('dark');
        localStorage.setItem('bidsmith-dark', isDark);
      }, [isDark]);

      return [isDark, () => setIsDark(p => !p)];
    };

    // --- Components ---

    const Logo = () => (
      <div className="flex items-center gap-3 group cursor-pointer select-none">
        <div className="relative">
          <img 
            src="https://unpkg.com/lucide-static@latest/icons/rocket.svg" 
            className="w-6 h-6 filter invert transition-transform duration-300 group-hover:-translate-y-1 group-hover:rotate-12" 
            alt="Rocket"
          />
        </div>
        <span className="px-3 py-1 bg-black text-white font-bold rounded-full text-sm tracking-wide group-hover:bg-teal-600 transition-colors duration-300 shadow-lg">
          BIDSMITH
        </span>
      </div>
    );

    const Navbar = ({ isDark, toggleDark }) => (
      <nav className="sticky top-0 z-50 bg-gray-900/95 dark:bg-gray-950/95 backdrop-blur-sm border-b border-gray-800 transition-colors duration-300">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex items-center justify-between h-16">
            <Logo />
            
            <div className="hidden md:flex items-center space-x-8">
              {['Features', 'Pricing', 'Docs', 'Contact'].map((item) => (
                <a key={item} href={`#${item.toLowerCase()}`} className="text-sm font-medium text-gray-300 hover:text-white transition-colors duration-200">
                  {item}
                </a>
              ))}
            </div>

            <button
              onClick={toggleDark}
              className="p-2 rounded-lg bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-teal-500"
              aria-label="Toggle Dark Mode"
            >
              <img 
                src={`https://unpkg.com/lucide-static@latest/icons/${isDark ? 'sun' : 'moon'}.svg`}
                className={`w-5 h-5 ${isDark ? 'filter invert' : 'filter invert'}`}
                alt="Toggle"
              />
            </button>
          </div>
        </div>
      </nav>
    );

    const Hero = () => (
      <div className="relative overflow-hidden bg-gray-900 pt-16 pb-32 lg:pt-32 lg:pb-40">
        <div className="absolute inset-0 bg-gradient-to-br from-gray-900 via-gray-800 to-teal-900/20 opacity-90"></div>
        <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
          <h1 className="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white tracking-tight mb-6 drop-shadow-sm">
            <span className="block">AI-Powered Bidding</span>
            <span className="block text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">
              & Decision Engine
            </span>
          </h1>
          <p className="mt-4 max-w-2xl mx-auto text-xl text-gray-300 mb-10">
            Turn data into winning bids in seconds. Seamless API, real-time analytics, 
            and a suite of intelligent agents at your fingertips.
          </p>
          <div className="flex justify-center gap-4">
            <button className="px-8 py-4 bg-teal-500 text-white font-bold rounded-lg shadow-lg shadow-teal-500/30 hover:bg-teal-600 hover:scale-105 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:ring-offset-2 focus:ring-offset-gray-900">
              Get Started Free
            </button>
            <button className="px-8 py-4 bg-gray-800 text-gray-200 font-semibold rounded-lg border border-gray-700 hover:bg-gray-700 hover:text-white transition-all duration-300">
              View Documentation
            </button>
          </div>
        </div>
      </div>
    );

    const FeatureCard = ({ icon, title, desc }) => (
      <div className="group relative p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.02] border border-gray-100 dark:border-gray-700">
        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-400 to-emerald-500 rounded-t-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        <div className="w-12 h-12 bg-teal-50 dark:bg-teal-900/30 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
          <img src={`https://unpkg.com/lucide-static@latest/icons/${icon}.svg`} className="w-6 h-6 text-teal-600 dark:text-teal-400" alt={title} />
        </div>
        <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-3">{title}</h3>
        <p className="text-gray-600 dark:text-gray-300 leading-relaxed">{desc}</p>
      </div>
    );

    const Features = () => (
      <section id="features" className="py-24 bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="text-center mb-16">
            <h2 className="text-base font-semibold text-teal-600 dark:text-teal-400 tracking-wide uppercase">Capabilities</h2>
            <p className="mt-2 text-3xl font-extrabold text-gray-900 dark:text-white sm:text-4xl">
              Why BidSmith?
            </p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            <FeatureCard 
              icon="brain-circuit" 
              title="Smart Agents" 
              desc="AI agents that analyze market data, optimize bids, and suggest strategies automatically."
            />
            <FeatureCard 
              icon="zap" 
              title="Real-time" 
              desc="Sub-second response times powered by our ARIS Protocol. Speed is your competitive edge."
            />
            <FeatureCard 
              icon="shield-check" 
              title="Secure" 
              desc="End-to-end encryption, role-based access control, and immutable audit logs."
            />
          </div>
        </div>
      </section>
    );

    const TierCard = ({ tier, onSelect }) => {
      const isEnterprise = tier.id === 'enterprise';
      return (
        <div className={`relative flex flex-col p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 border ${isEnterprise ? 'border-teal-500 ring-1 ring-teal-500' : 'border-gray-200 dark:border-gray-700'}`}>
          {isEnterprise && (
            <div className="absolute top-0 right-0 -mt-3 -mr-3 px-3 py-1 bg-teal-500 text-white text-xs font-bold rounded-full shadow-md">
              POPULAR
            </div>
          )}
          <h3 className="text-xl font-bold text-gray-900 dark:text-white">{tier.name}</h3>
          <div className="mt-4 flex items-baseline text-gray-900 dark:text-white">
            <span className="text-4xl font-extrabold tracking-tight">${tier.price || 0}</span>
            <span className="ml-1 text-xl font-medium text-gray-500 dark:text-gray-400">/mo</span>
          </div>
          <p className="mt-4 text-gray-500 dark:text-gray-400 text-sm">{tier.description}</p>
          
          <ul className="mt-6 space-y-4 flex-1">
            {tier.features.map((feature, idx) => (
              <li key={idx} className="flex items-start">
                <img src="https://unpkg.com/lucide-static@latest/icons/check.svg" className="w-5 h-5 text-teal-500 shrink-0 mr-2" alt="check" />
                <span className="text-sm text-gray-600 dark:text-gray-300">{feature}</span>
              </li>
            ))}
          </ul>

          <button
            onClick={() => onSelect(tier)}
            className={`mt-8 w-full py-3 px-4 rounded-lg font-semibold transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 ${
              isEnterprise 
                ? 'bg-teal-500 text-white hover:bg-teal-600 hover:scale-105 shadow-lg shadow-teal-500/30 animate-pulse' 
                : 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600'
            }`}
          >
            {isEnterprise ? 'Fast-Track →' : 'Select Plan'}
          </button>
        </div>
      );
    };

    const Pricing = () => {
      const [tiers, setTiers] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Fetch from production API or fallback to local if needed
        const API_URL = 'https://api.bidsmith.pro/pricing'; 
        
        fetch(API_URL)
          .then(res => res.json())
          .then(data => {
            setTiers(data);
            setLoading(false);
          })
          .catch(err => {
            console.error("Failed to fetch pricing", err);
            // Fallback data for demo purposes if API fails
            setTiers([
              { id: 'starter', name: 'Starter', price: 29, description: 'Core agents with 200 free calls.', features: ['Bid intelligence core', '200 calls/month', 'Standard support'] },
              { id: 'growth', name: 'Growth', price: 199, description: '1,000 calls/month + priority support.', features: ['Everything in Starter', '1,000 calls/month', 'Priority support'] },
              { id: 'enterprise', name: 'Enterprise', price: 2500, description: 'Unlimited calls & private endpoints.', features: ['Custom terms', 'Private infrastructure', 'SLA-backed uptime', 'Dedicated account manager'] }
            ]);
            setLoading(false);
          });
      }, []);

      const handleSelect = async (tier) => {
        if (tier.id === 'enterprise') {
          // Placeholder for Stripe Checkout
          alert("Redirecting to Stripe Checkout for Enterprise...");
          // In production:
          // const stripe = Stripe('pk_live_...');
          // const res = await fetch('https://api.bidsmith.pro/api/checkout/session', ...);
          // const { id } = await res.json();
          // stripe.redirectToCheckout({ sessionId: id });
        } else {
          alert(`Selected ${tier.name} plan`);
        }
      };

      return (
        <section id="pricing" className="py-24 bg-white dark:bg-gray-950 transition-colors duration-300">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="text-center mb-16">
              <h2 className="text-3xl font-extrabold text-gray-900 dark:text-white sm:text-4xl">
                Simple, Transparent Pricing
              </h2>
              <p className="mt-4 text-xl text-gray-500 dark:text-gray-400">
                Start small and scale as you grow.
              </p>
            </div>
            
            {loading ? (
              <div className="flex justify-center py-12">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-500"></div>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto">
                {tiers.map(tier => (
                  <TierCard key={tier.id} tier={tier} onSelect={handleSelect} />
                ))}
              </div>
            )}
          </div>
        </section>
      );
    };

    const Footer = () => (
      <footer className="bg-gray-900 text-gray-400 py-12 border-t border-gray-800">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
          <div className="mb-4 md:mb-0">
            <span className="text-lg font-bold text-white">BIDSMITH</span>
            <p className="text-sm mt-1">© {new Date().getFullYear()} BidSmith Inc. All rights reserved.</p>
          </div>
          <div className="flex space-x-6">
            <a href="#" className="hover:text-white transition-colors">Privacy</a>
            <a href="#" className="hover:text-white transition-colors">Terms</a>
            <a href="#" className="hover:text-white transition-colors">Twitter</a>
          </div>
        </div>
      </footer>
    );

    const App = () => {
      const [isDark, toggleDark] = useDarkMode();
      
      return (
        <div className="min-h-screen flex flex-col">
          <Navbar isDark={isDark} toggleDark={toggleDark} />
          <main className="flex-grow">
            <Hero />
            <Features />
            <Pricing />
          </main>
          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- 
    CONFIGURATION NOTES:
    1. Stripe Key: Replace 'pk_test_...' in the handleSelect function with your actual Stripe Publishable Key.
    2. API Endpoint: The Pricing component fetches from 'https://api.bidsmith.pro/pricing'. 
       To test locally, change API_URL to 'http://localhost:8080/pricing'.
  -->
</body>
</html>
