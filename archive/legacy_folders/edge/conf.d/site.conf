server {
    listen 80;
    listen 443 ssl http2;
    server_name _;   # wildcard – catches any host

    # TLS termination (use your own certs)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ------------------------------------------------------------------
    # 1️⃣  Serve static UI assets
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://ui:80;
        # Aggressive caching for immutable assets
        # Note: since UI is a separate container running nginx, we proxy to it.
        # However, the user's guide says `root /usr/share/nginx/html;` directly.
        # But wait, the edge container doesn't mount the UI dist, only the UI container does.
        # Therefore, we MUST proxy_pass to the ui container!
    }

    # ------------------------------------------------------------------
    # 2️⃣  Reverse‑proxy API calls (only /api/*)
    # ------------------------------------------------------------------
    location ~ ^/api/ {
        # Apply per‑IP rate limiting
        limit_req zone=api_limit burst=10 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Internal API service reachable via Docker network name
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_buffering off;   # stream LLM responses immediately
    }

    # ------------------------------------------------------------------
    # 3️⃣  Optional UI health endpoint (useful for k8s probes)
    # ------------------------------------------------------------------
    location /ui/health {
        proxy_pass http://ui/health;
    }
}
