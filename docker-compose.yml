version: "3.9"

networks:
  internal:
    driver: bridge
    internal: true

  external:
    driver: bridge

services:
  ui:
    image: nginx:alpine
    container_name: bidsmith-ui
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bidsmith-api
    expose:
      - "8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "4g"
        reservations:
          cpus: "0.5"
          memory: "1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  edge:
    image: nginx:alpine
    container_name: bidsmith-edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./edge/conf.d:/etc/nginx/conf.d:ro
      - ./edge/certs:/etc/nginx/certs:ro
    networks:
      - internal
      - external
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
